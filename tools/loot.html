<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Import OSRS boss loot CSV and value it with live GE prices." />
  <meta name="theme-color" content="#1e1e1e" />
  <title>Loot Import — Graardor</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <script src="/assets/js/theme-init.js"></script>
  <link rel="stylesheet" href="/assets/css/theme.css" />
</head>
<body class="site ads-off">
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-logo" href="/"><span class="site-logo-text">Graardor</span></a>
      <nav class="site-nav" aria-label="Main">
        <span class="nav-label">Tools</span>
        <a href="/tools/flips">Economy</a>
        <a href="/tools/dashboard">Track</a>
        <a href="/tools/prep">Plan</a>
        <a href="/guides">Guides</a>
        <a href="/changelog">Changelog</a>
        <span id="authSlot"></span>
        <a href="https://ko-fi.com/greatblue" class="kofi-nav-cta" target="_blank" rel="noopener">Support</a>
      </nav>
    </div>
  </header>
  <div class="page-hero"><h1>Loot Import</h1><p>Paste CSV loot (item name, quantity) — values at instant sell prices.</p></div>
  <div class="status-bar"><span id="lootStatus">Ready</span><span>Total: <strong id="lootTotal">—</strong></span></div>
  <div class="tool-page-main"><main style="padding:1rem 1.25rem 2rem;">
    <label for="lootCsv">Loot CSV</label>
    <textarea id="lootCsv" rows="8" style="width:100%;margin:0.5rem 0 1rem;padding:0.75rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);" placeholder="Item name,Quantity&#10;Abyssal whip,1&#10;Dragon bones,15"></textarea>
    <button type="button" id="lootParseBtn">Value loot</button>
    <div class="table-wrap" style="margin-top:1rem;"><table><thead><tr><th>Item</th><th class="num">Qty</th><th class="num">Sell ea.</th><th class="num">Value</th></tr></thead><tbody id="lootBody"></tbody></table></div>
  </main></div>
  <footer class="site-footer"><p><a href="/">← Graardor home</a></p></footer>
  <script src="/assets/js/prices-core.js"></script>
  <script src="/assets/js/loot.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/site-chrome.js"></script>
</body>
</html>
