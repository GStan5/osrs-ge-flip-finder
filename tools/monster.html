<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="OSRS monster lookup — combat levels, hitpoints, slayer info, and combat bonuses. Graardor." />
  <meta name="theme-color" content="#1e1e1e" />
  <meta property="og:title" content="Monster lookup — Graardor" />
  <meta property="og:description" content="Search OSRS monsters by name — bundled combat stats from game data." />
  <title>Monster lookup — Graardor</title>
  <script src="/assets/js/theme-init.js"></script>
  <link rel="stylesheet" href="/assets/css/theme.css" />
</head>
<body class="site ads-off tool-page">
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-logo" href="/">
        <span class="site-logo-text">Graardor</span>
      </a>
      <nav class="site-nav" aria-label="Main">
        <span class="nav-label">Tools</span>
        <a href="/tools/flips">Economy</a>
        <a href="/tools/dashboard">Track</a>
        <a href="/tools/prep">Plan</a>
        <a href="/guides">Guides</a>
        <a href="/changelog">Changelog</a>
        <span id="authSlot"></span>
        <a href="https://ko-fi.com/greatblue" class="kofi-nav-cta" target="_blank" rel="noopener">Support</a>
      </nav>
    </div>
  </header>

  <div class="page-hero">
    <h1 id="monsterPageTitle">Monster lookup</h1>
    <p>Combat levels, HP, slayer info, drop rates, and combat bonuses.</p>
  </div>

  <div class="status-bar">
    <span id="monsterStatus">Loading…</span>
  </div>

  <div class="item-lookup-bar monster-lookup-bar">
    <label for="monsterSearch" class="visually-hidden">Search monsters</label>
    <input id="monsterSearch" type="search" placeholder="Search any monster… e.g. General Graardor" autocomplete="off" />
  </div>
  <div id="monsterLookupResults" class="item-lookup-results monster-lookup-results"></div>

  <div id="monsterDetailRoot"></div>

  <footer class="site-footer">
    <p><a href="/">Graardor home</a> · Not affiliated with Jagex.</p>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/assets/js/prices-core.js"></script>
  <script src="/assets/js/monster.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/site-chrome.js"></script>
</body>
</html>
