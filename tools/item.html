<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="OSRS item price lookup — live GE buy/sell, margin, volume, equipment stats, and price charts. Graardor." />
  <meta name="theme-color" content="#1e1e1e" />
  <meta property="og:title" content="Item lookup — Graardor" />
  <meta property="og:description" content="Live GE prices, margins, and sparklines for any OSRS item." />
  <title>Item lookup — Graardor</title>
  <script src="/assets/js/theme-init.js"></script>
  <link rel="stylesheet" href="/assets/css/theme.css" />
</head>
<body class="site ads-off tool-page">
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-logo" href="/">
        <span class="site-logo-text">Graardor</span>
      </a>
      <nav class="site-nav" aria-label="Main">
        <span class="nav-label">Tools</span>
        <a href="/tools/flips">Economy</a>
        <a href="/tools/dashboard">Track</a>
        <a href="/tools/prep">Plan</a>
        <a href="/guides">Guides</a>
        <a href="/changelog">Changelog</a>
        <span id="authSlot"></span>
        <a href="https://ko-fi.com/greatblue" class="kofi-nav-cta" target="_blank" rel="noopener">Support</a>
      </nav>
    </div>
  </header>

  <div class="page-hero">
    <h1 id="itemPageTitle">Item lookup</h1>
    <p>Live GE buy/sell, margin after tax, volume, and a recent price chart.</p>
  </div>

  <div class="status-bar">
    <span id="itemStatus">Loading…</span>
  </div>

  <div class="item-lookup-bar">
    <label for="itemSearch" class="visually-hidden">Search items</label>
    <input id="itemSearch" type="search" placeholder="Search any item… e.g. abyssal whip" autocomplete="off" />
  </div>
  <div id="itemLookupResults" class="item-lookup-results"></div>

  <div id="itemDetailRoot"></div>

  <footer class="site-footer">
    <p><a href="https://oldschool.runescape.wiki/w/RuneScape:Real-time_Prices" target="_blank" rel="noopener">Price data</a> from the OSRS Wiki · <a href="/">Graardor home</a></p>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/assets/js/prices-core.js"></script>
  <script src="/assets/js/components.js"></script>
  <script src="/assets/js/sync.js"></script>
  <script src="/assets/js/item.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/site-chrome.js"></script>
</body>
</html>
